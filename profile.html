<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile</title>
  <link rel="stylesheet" href="css/style.css">
  <script type="module" src="js/app.js" defer></script>
</head>
<body>
  <div class="profile-container">
    <h2>الملف الشخصي</h2>

    <div class="profile-info">
      <img id="profilePic" src="assets/logo.png" alt="Profile Picture">
      <h3 id="username">اسم المستخدم</h3>
      <p id="status">متصل الآن</p>
    </div>

    <div class="profile-actions">
      <label for="usernameInput">تغيير الاسم:</label>
      <input type="text" id="usernameInput" placeholder="اكتب اسم جديد">
      <button id="saveProfileBtn">حفظ التغييرات</button>
    </div>

    <button id="backHomeBtn">⬅️ العودة إلى المحادثات</button>
  </div>
</body>
</html>
